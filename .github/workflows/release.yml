name: Release

# Build cross-platform static binaries and attach them to the GitHub release
# whenever a vX.Y.Z tag is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the release and upload artifacts

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs the full history and tags

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
